apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlaneTemplate
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Version }}-control-plane
spec:
  template:
    spec:
      kubeadmConfigSpec:
        clusterConfiguration:
          apiServer:
            certSANs: [localhost, 127.0.0.1, 0.0.0.0, host.docker.internal]
          controllerManager:
            extraArgs:
              - name: bind-address
                value: 0.0.0.0
              - name: secure-port
                value: "10257"
              - name: profiling
                value: "false"
              - name: terminated-pod-gc-threshold
                value: "100"
          scheduler:
            extraArgs:
              - name: bind-address
                value: 0.0.0.0
              - name: secure-port
                value: "10259"
              - name: profiling
                value: "false"
          etcd:
            local:
              dataDir: /var/lib/etcd
              extraArgs:
                - name: listen-metrics-urls
                  value: http://0.0.0.0:2381
                - name: auto-compaction-mode
                  value: periodic
                - name: auto-compaction-retention
                  value: 8h
                - name: election-timeout
                  value: "2500"
                - name: heartbeat-interval
                  value: "250"
                - name: snapshot-count
                  value: "6400"
        files:
        - content: |
            ---
            apiVersion: kubeproxy.config.k8s.io/v1alpha1
            kind: KubeProxyConfiguration
            metricsBindAddress: "0.0.0.0:10249"
          path: /etc/kube-proxy-config.yaml
        - content: |
            #!/usr/bin/env bash
            set -o errexit
            set -o nounset
            set -o pipefail

            dir=$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )
            readonly dir

            if [[ ! -f ${dir}/kube-proxy-config.yaml ]]; then
              exit 0
            fi

            kubeadm_file="/etc/kubeadm.yml"
            if [[ ! -f ${kubeadm_file} ]]; then
              kubeadm_file="/run/kubeadm/kubeadm.yaml"
            fi

            if [[ ! -f ${kubeadm_file} ]]; then
              exit 0
            fi

            cat "${dir}/kube-proxy-config.yaml" >> "${kubeadm_file}"
            rm "${dir}/kube-proxy-config.yaml"

            echo success > /tmp/kube-proxy-patch
          owner: root:root
          path: /etc/kube-proxy-patch.sh
          permissions: "0755"
        preKubeadmCommands:
        - bash /etc/kube-proxy-patch.sh
        initConfiguration:
          nodeRegistration:
            criSocket: unix:///var/run/containerd/containerd.sock
            kubeletExtraArgs:
              - name: eviction-hard
                value: "nodefs.available<0%,nodefs.inodesFree<0%,imagefs.available<0%"
              - name: fail-swap-on
                value: "false"
        joinConfiguration:
          nodeRegistration:
            criSocket: unix:///var/run/containerd/containerd.sock
            kubeletExtraArgs:
              - name: eviction-hard
                value: "nodefs.available<0%,nodefs.inodesFree<0%,imagefs.available<0%"
              - name: fail-swap-on
                value: "false"
