# Node images for kind (patched at build time by build.sh for each K8s version)
images:
  controlPlane:
    - name: registry.scs.community/docker.io/kindest/node:v1.35.1
  worker:
    - name: registry.scs.community/docker.io/kindest/node:v1.35.1

# ClusterClass variable defaults
# These are referenced by the ClusterClass template and can be overridden per deployment.
variables:
  imageRepository: ""
  certSANs: []
  registryMirrors: []
  oidcConfig:
    clientID: ""
    issuerURL: ""
    usernameClaim: "preferred_username"
    groupsClaim: "groups"
    usernamePrefix: "oidc:"
    groupsPrefix: "oidc:"
