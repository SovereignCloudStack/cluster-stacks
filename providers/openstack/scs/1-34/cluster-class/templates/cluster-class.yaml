    #
    # Registry mirror patches
    #
    - name: registryMirrorsControlPlane
      description: "Configure registry mirrors on control plane nodes (containerd + CRI-O)."
      enabledIf: {{ `'{{ if .registryMirrors }}true{{end}}'` }}
      definitions:
        - selector:
            apiVersion: controlplane.cluster.x-k8s.io/v1beta2
            kind: KubeadmControlPlaneTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
          - op: add
            path: "/spec/template/spec/kubeadmConfigSpec/files"
            valueFrom:
              template: |
                {{ `{{- range $r := .registryMirrors }}` }}
                - content: |
                    server = "{{ `{{ $r.urlUpstream }}` }}"
                    [host."{{ `{{ $r.urlMirror }}` }}"]
                      capabilities = ["pull","resolve"]
                      override_path = true
                  owner: root:root
                  path: /etc/containerd/certs.d/{{ `{{ $r.hostnameUpstream }}` }}/hosts.toml
                  permissions: "0644"
                - content: |
                    [[registry]]
                    prefix = "{{ `{{ $r.hostnameUpstream }}` }}"
                    location = "{{ `{{ $r.hostnameUpstream }}` }}"
                    [[registry.mirror]]
                    location = "{{ `{{ $r.urlMirror }}` }}"
                  owner: root:root
                  path: /etc/containers/registries.conf.d/50-mirror-{{ `{{ $r.hostnameUpstream }}` }}.conf
                  permissions: "0644"
                {{ `{{- if $r.certMirror }}` }}
                - content: "{{ `{{ $r.certMirror }}` }}"
                  owner: root:root
                  path: /etc/containerd/certs/{{ `{{ $r.hostnameUpstream }}` }}/ca.crt
                  permissions: "0644"
                - content: "{{ `{{ $r.certMirror }}` }}"
                  owner: root:root
                  path: /etc/containers/certs.d/{{ `{{ $r.hostnameUpstream }}` }}/ca.crt
                  permissions: "0644"
                {{ `{{- end }}` }}
                {{ `{{- end }}` }}
                - path: /etc/kube-proxy-config.yaml
                  owner: root:root
                  permissions: "0644"
                  content: |
                    ---
                    apiVersion: kubeproxy.config.k8s.io/v1alpha1
                    kind: KubeProxyConfiguration
                    metricsBindAddress: "0.0.0.0:10249"

                - path: /etc/kube-proxy-patch.sh
                  owner: root:root
                  permissions: "0755"
                  content: |
                    #!/usr/bin/env bash
                    set -euo pipefail
                    dir=$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )
                    kubeadm_file="/etc/kubeadm.yml"
                    [[ -f ${kubeadm_file} ]] || kubeadm_file="/run/kubeadm/kubeadm.yaml"
                    [[ -f ${kubeadm_file} ]] || exit 0
                    [[ -f ${dir}/kube-proxy-config.yaml ]] || exit 0
                    cat "${dir}/kube-proxy-config.yaml" >> "${kubeadm_file}"
                    rm -f "${dir}/kube-proxy-config.yaml"
                    echo success > /tmp/kube-proxy-patch
          - op: add
            path: "/spec/template/spec/kubeadmConfigSpec/preKubeadmCommands/-"
            value: "bash /etc/kube-proxy-patch.sh"
    - name: registryMirrorsWorker
      description: "Configure registry mirrors on worker nodes (containerd + CRI-O)."
      enabledIf: {{ `'{{ if .registryMirrors }}true{{end}}'` }}
      definitions:
        - selector:
            apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
            kind: KubeadmConfigTemplate
            matchResources:
              machineDeploymentClass:
                names:
                  - default-worker
          jsonPatches:
          - op: add
            path: "/spec/template/spec/files"
            valueFrom:
              template: |
                {{ `{{- range $r := .registryMirrors }}` }}
                - content: |
                    server = "{{ `{{ $r.urlUpstream }}` }}"
                    [host."{{ `{{ $r.urlMirror }}` }}"]
                      capabilities = ["pull","resolve"]
                      override_path = true
                  owner: root:root
                  path: /etc/containerd/certs.d/{{ `{{ $r.hostnameUpstream }}` }}/hosts.toml
                  permissions: "0644"
                - content: |
                    [[registry]]
                    prefix = "{{ `{{ $r.hostnameUpstream }}` }}"
                    location = "{{ `{{ $r.hostnameUpstream }}` }}"
                    [[registry.mirror]]
                    location = "{{ `{{ $r.urlMirror }}` }}"
                  owner: root:root
                  path: /etc/containers/registries.conf.d/50-mirror-{{ `{{ $r.hostnameUpstream }}` }}.conf
                  permissions: "0644"
                {{ `{{- if $r.certMirror }}` }}
                - content: "{{ `{{ $r.certMirror }}` }}"
                  owner: root:root
                  path: /etc/containerd/certs/{{ `{{ $r.hostnameUpstream }}` }}/ca.crt
                  permissions: "0644"
                - content: "{{ `{{ $r.certMirror }}` }}"
                  owner: root:root
                  path: /etc/containers/certs.d/{{ `{{ $r.hostnameUpstream }}` }}/ca.crt
                  permissions: "0644"
                {{ `{{- end }}` }}
                {{ `{{- end }}` }}
